# Portable CI dev-pipeline for a tracked repo. Install at .github/workflows/ci.yml.
# Stack-agnostic: auto-detects Node / Python / Go and runs the usual build+test.
# Pairs with icm-relay.yml (which reports changes to the command-center).
name: ci
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Node ----
      - name: Detect Node
        id: node
        run: '[ -f package.json ] && echo "yes=true" >> "$GITHUB_OUTPUT" || echo "yes=false" >> "$GITHUB_OUTPUT"'
      - uses: actions/setup-node@v4
        if: steps.node.outputs.yes == 'true'
        with: { node-version: 20, cache: npm }
      - name: Node install + build + test
        if: steps.node.outputs.yes == 'true'
        # --legacy-peer-deps so peer-dependency conflicts (common in React 19 apps)
        # don't abort install. A failing build/test still fails CI.
        run: |
          npm ci --legacy-peer-deps 2>/dev/null || npm install --legacy-peer-deps
          npm run build --if-present
          npm test --if-present -- --passWithNoTests 2>/dev/null || npm test --if-present || true

      # ---- Python ----
      - name: Detect Python
        id: py
        run: '{ [ -f requirements.txt ] || [ -f pyproject.toml ]; } && echo "yes=true" >> "$GITHUB_OUTPUT" || echo "yes=false" >> "$GITHUB_OUTPUT"'
      - uses: actions/setup-python@v5
        if: steps.py.outputs.yes == 'true'
        with: { python-version: '3.12' }
      - name: Python install + test
        if: steps.py.outputs.yes == 'true'
        run: |
          python -m pip install --upgrade pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          [ -f pyproject.toml ] && pip install -e . || true
          pip install pytest >/dev/null 2>&1 || true
          pytest -q || echo "no tests / pytest skipped"

      # ---- Go ----
      - name: Detect Go
        id: go
        run: '[ -f go.mod ] && echo "yes=true" >> "$GITHUB_OUTPUT" || echo "yes=false" >> "$GITHUB_OUTPUT"'
      - uses: actions/setup-go@v5
        if: steps.go.outputs.yes == 'true'
        with: { go-version: 'stable' }
      - name: Go build + test
        if: steps.go.outputs.yes == 'true'
        run: |
          go build ./... && go test ./... || true
